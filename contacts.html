<!doctype html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Контакти — Expowall.shop</title>
<link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<a class="skip-link" href="#main">Перейти до змісту</a>
<header class="site-header" id="site-header"></header>
<main id="main">
  <div class="container">
    <nav class="breadcrumbs"><a href="/">Головна</a><span>/</span><span>Контакти</span></nav>
  </div>
  <section class="content-page">
    <div class="container">
      <h1>Контакти</h1>
      <div class="contacts-grid">
        <div>
          <div class="contact-row">
            <div class="contact-row__label">Телефон</div>
            <a class="contact-row__value" id="contactPhone" href="tel:"></a>
          </div>
          <div class="contact-row">
            <div class="contact-row__label">Email</div>
            <a class="contact-row__value" id="contactEmail" href="mailto:"></a>
          </div>
          <div class="contact-row">
            <div class="contact-row__label">Адреса</div>
            <div class="contact-row__value" id="contactAddress"></div>
          </div>
          <div class="contact-row">
            <div class="contact-row__label">Графік роботи</div>
            <div class="contact-row__value" id="contactHours"></div>
          </div>
          <div class="contact-row" style="border-bottom:none">
            <div class="contact-row__label">Соцмережі</div>
            <div id="contactSocial" style="display:flex;gap:10px;margin-top:8px;"></div>
          </div>
        </div>
        <div>
          <button class="btn btn-primary btn-block" id="openOrderModalContacts">Залишити заявку</button>
        </div>
      </div>
    </div>
  </section>
</main>
<footer class="site-footer" id="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script type="module" src="/js/layout.js"></script>
<script type="module" src="/js/order-form.js"></script>
<script type="module" src="/js/contacts.js"></script>
<script type="module">
  document.getElementById("openOrderModalContacts")?.addEventListener("click", () => {
    document.dispatchEvent(new CustomEvent("expowall:openOrderModal", { detail: { productTitle: "Заявка з контактів" } }));
  });
</script>
</body>
</html>
