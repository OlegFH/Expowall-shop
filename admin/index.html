<!doctype html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Адмінка — Expowall.shop</title>
<link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="admin-login" id="loginScreen">
  <div class="admin-login__box">
    <h1>Адмінка Expowall.shop</h1>
    <p>Увійдіть, щоб керувати каталогом і заявками</p>
    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required autocomplete="username">
      </div>
      <div class="field">
        <label for="loginPassword">Пароль</label>
        <input type="password" id="loginPassword" required autocomplete="current-password">
      </div>
      <p class="field-error" id="loginError"></p>
      <button type="submit" class="btn btn-primary btn-block" id="loginSubmitBtn">Увійти</button>
    </form>
    <p class="field-hint" style="margin-top:18px">
      Користувача створіть у Supabase → Authentication → Users → Add user.
    </p>
  </div>
</div>

<div class="admin-shell" id="adminShell">
  <aside class="admin-sidebar">
    <div>
      <div class="admin-sidebar__logo">EXPOWALL · Адмін</div>
      <nav>
        <button data-panel="categories" class="is-active">Категорії</button>
        <button data-panel="products">Товари</button>
        <button data-panel="orders">Заявки</button>
        <button data-panel="content">Тексти сайту</button>
      </nav>
    </div>
    <div class="admin-sidebar__footer">
      <a href="/" style="display:block;color:#c7c9cf;font-size:.85rem;margin-bottom:12px">← На сайт</a>
      <button class="btn btn-ghost btn-block" id="logoutBtn">Вийти</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h2 id="topbarTitle">Категорії</h2>
    </div>

    <div class="admin-panel is-active" id="panel-categories"></div>
    <div class="admin-panel" id="panel-products"></div>
    <div class="admin-panel" id="panel-orders"></div>
    <div class="admin-panel" id="panel-content"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script type="module" src="/admin/js/admin.js"></script>
</body>
</html>
