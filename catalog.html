<!doctype html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог — Expowall.shop</title>
<meta name="description" content="Каталог глянцевих стінових панелей та скінали для кухні. Фільтр за категоріями, доставка по Україні.">
<link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<a class="skip-link" href="#main">Перейти до змісту</a>

<header class="site-header" id="site-header"></header>

<main id="main">
  <div class="container">
    <nav class="breadcrumbs" aria-label="Хлібні крихти">
      <a href="/">Головна</a><span>/</span><span>Каталог</span>
    </nav>
  </div>

  <section class="catalog">
    <div class="container">
      <div class="catalog__top">
        <h1 class="catalog__title" id="catalogTitle">Весь каталог</h1>
        <p class="catalog__count" id="catalogCount"></p>
      </div>

      <div class="filters" id="filters" aria-label="Фільтр за категоріями"></div>

      <div class="skeleton-grid" id="skeletonGrid"></div>
      <div class="product-grid" id="productGrid" style="display:none"></div>

      <div class="empty-state" id="emptyState" style="display:none">
        <h3>Товарів не знайдено</h3>
        <p>Спробуйте вибрати іншу категорію або зайдіть пізніше.</p>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>
  </section>
</main>

<footer class="site-footer" id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script type="module" src="/js/layout.js"></script>
<script type="module" src="/js/order-form.js"></script>
<script type="module" src="/js/catalog.js"></script>
<script>
  // заполняем skeleton-карточки статично, без модулей, чтобы не мигало при загрузке
  document.getElementById("skeletonGrid").innerHTML = Array.from({length:8}).map(()=>'<div class="skeleton-card"></div>').join("");
</script>
</body>
</html>
