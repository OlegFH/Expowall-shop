<!doctype html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Товар — Expowall.shop</title>
<link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<a class="skip-link" href="#main">Перейти до змісту</a>

<header class="site-header" id="site-header"></header>

<main id="main">
  <div class="container">
    <nav class="breadcrumbs" aria-label="Хлібні крихти">
      <a href="/">Головна</a><span>/</span>
      <a href="/catalog.html" id="crumbCategory">Каталог</a><span>/</span>
      <span id="crumbTitle">Товар</span>
    </nav>

    <div id="productRoot">
      <div class="product-view">
        <div class="carousel">
          <div class="carousel__main" id="carouselMain">
            <div class="carousel__track" id="carouselTrack"></div>
            <button class="carousel__nav carousel__nav--prev" id="carouselPrev" aria-label="Попереднє зображення">‹</button>
            <button class="carousel__nav carousel__nav--next" id="carouselNext" aria-label="Наступне зображення">›</button>
          </div>
          <div class="carousel__dots" id="carouselDots"></div>
          <div class="carousel__thumbs" id="carouselThumbs"></div>
        </div>

        <div class="product-info">
          <span class="product-info__cat" id="productCat"></span>
          <h1 class="product-info__title" id="productTitle"></h1>
          <div class="product-info__prices">
            <span class="product-info__price" id="productPrice"></span>
            <span class="product-info__old" id="productOldPrice" style="display:none"></span>
          </div>
          <p class="product-info__desc" id="productDesc"></p>
          <div class="product-info__actions">
            <button class="btn btn-primary" id="orderProductBtn">Замовити</button>
          </div>
          <div class="product-info__perks">
            <div class="perk"><strong>Доставка:</strong>&nbsp;по Києву та всій Україні</div>
            <div class="perk"><strong>Гарантія:</strong>&nbsp;12 місяців</div>
            <div class="perk"><strong>Виготовлення:</strong>&nbsp;під замовлення, будь-який розмір</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <section class="section" id="relatedSection" style="background:var(--porcelain-dim)">
    <div class="container">
      <div class="section-head">
        <div><span class="eyebrow">Схожі товари</span><h2>З цієї ж категорії</h2></div>
      </div>
      <div class="product-grid" id="relatedGrid"></div>
    </div>
  </section>
</main>

<footer class="site-footer" id="site-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script type="module" src="/js/layout.js"></script>
<script type="module" src="/js/order-form.js"></script>
<script type="module" src="/js/product.js"></script>
</body>
</html>
